name: Build and Deploy Board

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 GOAMD64=v1 \
          go build -trimpath -ldflags="-s -w" -o board main.go
          ls -lh board
          sha256sum board

      - name: Upload binary (password auth)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          source: "board"
          target: "/tmp"

      - name: Restart app (password auth)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -eu
            APP_DIR="/root/board"
            mkdir -p "$APP_DIR"
            cp /tmp/board "$APP_DIR/board"
            chmod +x "$APP_DIR/board"

            pkill -x board 2>/dev/null || true
            sleep 1

            cd "$APP_DIR"
            set -a
            . ./.env
            set +a
            nohup ./board > board.log 2>&1 &
            sleep 1
            tail -n 30 board.log || true
